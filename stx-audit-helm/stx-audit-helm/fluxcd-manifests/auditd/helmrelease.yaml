apiVersion: "helm.toolkit.fluxcd.io/v2beta1"
kind: HelmRelease
metadata:
  name: auditd
  labels:
    chart_group: auditd
spec:
  releaseName: ns-auditd
  chart:
    spec:
      chart: auditd
      version: REPLACE_HELM_CHART_VERSION
      sourceRef:
        kind: HelmRepository
        name: stx-platform
  interval: 1m
  timeout: 30m
  test:
    enable: false
  install:
    disableHooks: false
  upgrade:
    disableHooks: false
  valuesFrom:
    - kind: Secret
      name: auditd-static-overrides
      valuesKey: auditd-static-overrides.yaml
    - kind: Secret
      name: auditd-system-overrides
      valuesKey: auditd-system-overrides.yaml
